name: Build FocusFlow APK

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK with Optimized Gradle Settings
      run: |
        ./gradlew assembleDebug \
          -x test \
          --no-daemon \
          -Dorg.gradle.jvmargs="-Xmx3072m -XX:+UseG1GC" \
          -Dorg.gradle.parallel=true \
          --build-cache \
          -v
      timeout-minutes: 30

    - name: Find APK Location
      if: always()
      run: |
        echo "=== Searching for APK files ==="
        find app/build -name "*.apk" -type f 2>/dev/null || echo "No APK found with find"
        echo ""
        echo "=== Checking standard output directory ==="
        ls -lah app/build/outputs/ 2>/dev/null || echo "outputs directory not found"
        echo ""
        echo "=== Complete app/build tree ==="
        find app/build -type d -name outputs 2>/dev/null | head -5 || echo "No outputs directory found"

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: app/build/outputs/apk/**/app-debug.apk
        retention-days: 30
      if: success()

    - name: Upload All APKs (Fallback)
      uses: actions/upload-artifact@v4
      with:
        name: all-apks
        path: app/build/outputs/apk/
        retention-days: 30
      if: failure() && success()

    - name: Final Build Status Report
      if: always()
      run: |
        echo "=== BUILD STATUS REPORT ==="
        if [ -f app/build/outputs/apk/debug/app-debug.apk ]; then
          echo "✅ APK FOUND at: app/build/outputs/apk/debug/app-debug.apk"
          ls -lh app/build/outputs/apk/debug/app-debug.apk
        else
          echo "❌ APK NOT FOUND at standard location"
          echo "Searching for any APK files:"
          find app/build -name "*.apk" -type f 2>/dev/null && echo "Found APK(s) above" || echo "No APK files found anywhere"
        fi
