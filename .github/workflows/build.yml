name: Build FocusFlow APK

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK with Optimized Gradle Settings
      run: |
        ./gradlew assembleDebug \
          -x test \
          --no-daemon \
          -Dorg.gradle.jvmargs="-Xmx3072m -XX:+UseG1GC" \
          -Dorg.gradle.parallel=true \
          --build-cache \
          -v
      timeout-minutes: 30

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
      if: success()

    - name: Check Build Status
      if: always()
      run: |
        echo "Build Status Check:"
        ls -lah app/build/outputs/apk/debug/ || echo "APK directory not found"
        echo ""
        echo "Full build output directory:"
        ls -lah app/build/outputs/ 2>/dev/null || echo "Build outputs directory not found"
